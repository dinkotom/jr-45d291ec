name: build-and-deploy

on:
  schedule:
    - cron: "*/15 * * * *"   # každých ~15 min (GitHub může spouštět s mírným zpožděním)
  workflow_dispatch:          # ruční spuštění
  push:
    branches: [main]

permissions:
  contents: write   # write kvůli keepalive commitu (proti vypnutí cronu po 60 dnech)
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      TZ: Europe/Prague
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - name: Generate page
        run: |
          mkdir -p public
          python idos_spoje.py --pocet 16 --html public/index.html
      - uses: actions/upload-pages-artifact@v3
        with:
          path: public
      - name: Keepalive (prevent cron disable)
        run: |
          last=$(git log -1 --format=%ct)
          days=$(( ($(date +%s) - last) / 86400 ))
          echo "Dní od posledního commitu: $days"
          if [ "$days" -ge 50 ]; then
            git config user.name "keepalive-bot"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git commit --allow-empty -m "keepalive: udržení naplánovaného workflow"
            git push
          fi

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
